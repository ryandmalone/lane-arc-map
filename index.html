<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lane Arc Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { position: absolute; inset: 0; }

    #status {
      position: absolute; top: 16px; left: 16px;
      background: rgba(255,255,255,0.93); border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #555;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12); max-width: 320px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all;
    }
    #status.ok  { border-color: #1a7a4a33; color: #1a7a4a; }
    #status.err { border-color: #b0002033; color: #b00020; }

    #ui-controls {
      position: absolute; bottom: 20px; right: 16px;
      display: flex; gap: 8px;
    }
    #ui-controls button {
      background: rgba(255,255,255,0.93); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    #ui-controls button:hover { background: #fff; border-color: #004593; color: #004593; }
    #pin-btn.active { background: #004593; color: #fff; border-color: #004593; }

    #tooltip {
      display: none; position: fixed; z-index: 999;
      background: rgba(255,255,255,0.98); border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px; padding: 8px 13px; font-size: 12px; color: #333;
      pointer-events: none; line-height: 1.7; box-shadow: 0 2px 12px rgba(0,0,0,0.14);
    }
  </style>

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" defer></script>
  <script src="https://unpkg.com/deck.gl@8.9.33/dist.min.js" defer></script>
</head>
<body>

<div id="map"></div>
<div id="ui-controls">
  <button id="pin-btn">📍 Pin View</button>
  <button id="restart-btn">↺ Restart</button>
</div>
<div id="tooltip"></div>
<div id="status">⏳ Initializing…</div>

<script type="module">
const statusEl = document.getElementById('status');
const setStatus = (msg, cls = '') => { statusEl.textContent = msg; statusEl.className = cls; };

await new Promise(resolve => {
  if (typeof maplibregl !== 'undefined' && typeof deck !== 'undefined') return resolve();
  window.addEventListener('load', resolve, { once: true });
});

let allData = [], playTimer = null;
let overlay = null, mapReady = false;
let elementUnsub = null;

// ─── MapLibre with borders ────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  // Use a style that includes state + country borders
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [-96, 38], zoom: 3.8, pitch: 30,
});

map.on('load', () => {
  // Add country borders
  map.addSource('country-borders', {
    type: 'geojson',
    data: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
  });
  map.addLayer({
    id: 'country-borders-line',
    type: 'line',
    source: 'country-borders',
    paint: { 'line-color': '#999', 'line-width': 1, 'line-opacity': 0.7 },
  });

  // Add US state borders
  map.addSource('us-states', {
    type: 'geojson',
    data: 'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json',
  });
  map.addLayer({
    id: 'us-states-line',
    type: 'line',
    source: 'us-states',
    paint: { 'line-color': '#aaa', 'line-width': 0.6, 'line-opacity': 0.8 },
  });

  overlay = new deck.MapboxOverlay({ interleaved: false, layers: [] });
  map.addControl(overlay);
  mapReady = true;
  if (allData.length) renderArcs();
});

// ─── Sigma Plugin ─────────────────────────────────────────────────────────────
let sigmaClient = null;
try {
  const mod = await import('https://esm.sh/@sigmacomputing/plugin@1.0.9');
  sigmaClient = mod.client ?? null;
  if (!sigmaClient) throw new Error('No client export');
  if (typeof sigmaClient.initialize === 'function') sigmaClient.initialize();
  else if (typeof sigmaClient.init === 'function') sigmaClient.init();

  sigmaClient.config.configureEditorPanel([
    { name: 'source',         type: 'element' },
    { name: 'origin_city',    type: 'column', source: 'source', allowMultiple: false },
    { name: 'origin_lat',     type: 'column', source: 'source', allowMultiple: false },
    { name: 'origin_lng',     type: 'column', source: 'source', allowMultiple: false },
    { name: 'dest_city',      type: 'column', source: 'source', allowMultiple: false },
    { name: 'dest_lat',       type: 'column', source: 'source', allowMultiple: false },
    { name: 'dest_lng',       type: 'column', source: 'source', allowMultiple: false },
    { name: 'total_spend',    type: 'column', source: 'source', allowMultiple: false },
    { name: 'shipment_count', type: 'column', source: 'source', allowMultiple: false },
    { name: 'month',          type: 'column', source: 'source', allowMultiple: false },
  ]);

  sigmaClient.config.subscribe(cfg => {
    const elementId = cfg['source'];
    if (!elementId) { setStatus('⏳ Select a data source in\nthe editor panel →'); return; }
    if (elementUnsub) { try { elementUnsub(); } catch(e){} elementUnsub = null; }
    subscribe(elementId, cfg);
  });

} catch(e) {
  setStatus(`⚠ Sigma unavailable — sample data\n${e.message}`);
  loadSampleData();
}

function subscribe(elementId, cfg) {
  const el = sigmaClient.elements;
  let retried = false;
  const onData = (payload) => {
    if (!payload || Object.keys(payload).length === 0) {
      if (!retried) { retried = true; setStatus('⏳ Waiting for data…'); setTimeout(() => el.fetchMoreElementData(elementId), 500); }
      else setStatus('⚠ No data returned from Sigma.', 'err');
      return;
    }
    setStatus('✓ Data received', 'ok');
    ingestData(cfg, Object.fromEntries(Object.entries(payload)));
  };
  try {
    const unsub = el.subscribeToElementData(elementId, onData);
    elementUnsub = typeof unsub === 'function' ? unsub : typeof unsub?.unsubscribe === 'function' ? unsub.unsubscribe.bind(unsub) : () => {};
    setStatus('✓ Subscribed — waiting for data…');
  } catch(e) { setStatus(`❌ Subscribe failed:\n${e.message}`, 'err'); }
}

function ingestData(cfg, rows) {
  const colId = name => cfg[name];
  const latColId = colId('origin_lat');
  if (!latColId || !rows[latColId]?.length) {
    const remapped = Object.fromEntries(Object.keys(cfg).filter(k => rows[k]).map(k => [cfg[k], rows[k]]));
    if (Object.keys(remapped).length) return ingestData(cfg, remapped);
    setStatus(`⚠ No data.\nExpected: ${latColId}\nGot: ${Object.keys(rows).slice(0,4).join(', ')}`, 'err');
    return;
  }
  const len = rows[latColId].length;
  allData = [];
  for (let i = 0; i < len; i++) {
    const oLat = parseFloat(rows[colId('origin_lat')]?.[i]);
    const oLng = parseFloat(rows[colId('origin_lng')]?.[i]);
    const dLat = parseFloat(rows[colId('dest_lat')]?.[i]);
    const dLng = parseFloat(rows[colId('dest_lng')]?.[i]);
    if (!isFinite(oLat) || !isFinite(dLat) || !oLat || !dLat) continue;
    allData.push({
      originCity: String(rows[colId('origin_city')]?.[i] ?? ''),
      destCity:   String(rows[colId('dest_city')]?.[i]   ?? ''),
      originLat: oLat, originLng: oLng,
      destLat: dLat, destLng: dLng,
      spend:     parseFloat(rows[colId('total_spend')]?.[i])  || 0,
      shipments: parseInt(rows[colId('shipment_count')]?.[i]) || 0,
      month:     fmtMonthKey(rows[colId('month')]?.[i]),
    });
  }
  setStatus(`✓ ${allData.length} lanes loaded`, 'ok');
  if (mapReady) renderArcs();
}

function loadSampleData() {
  const cities = [
    { name: 'Chicago',     lat: 41.88,  lng: -87.63  },
    { name: 'Los Angeles', lat: 34.05,  lng: -118.24 },
    { name: 'Dallas',      lat: 32.78,  lng: -96.80  },
    { name: 'Atlanta',     lat: 33.75,  lng: -84.39  },
    { name: 'New York',    lat: 40.71,  lng: -74.01  },
    { name: 'Seattle',     lat: 47.61,  lng: -122.33 },
    { name: 'Miami',       lat: 25.77,  lng: -80.19  },
    { name: 'Denver',      lat: 39.74,  lng: -104.99 },
  ];
  allData = [];
  ['2024-01','2024-02','2024-03'].forEach(m => {
    cities.forEach((o, i) => cities.forEach((d, j) => {
      if (i === j) return;
      allData.push({ originCity: o.name, destCity: d.name,
        originLat: o.lat, originLng: o.lng, destLat: d.lat, destLng: d.lng,
        spend: Math.random()*800000+20000, shipments: Math.floor(Math.random()*300+5), month: m });
    }));
  });
  setStatus('📍 Sample data active');
  if (mapReady) renderArcs();
}

let pinned = false;
document.getElementById('pin-btn').addEventListener('click', () => {
  pinned = !pinned;
  map.dragPan[pinned ? 'disable' : 'enable']();
  map.scrollZoom[pinned ? 'disable' : 'enable']();
  map.doubleClickZoom[pinned ? 'disable' : 'enable']();
  map.touchZoomRotate[pinned ? 'disable' : 'enable']();
  document.getElementById('pin-btn').classList.toggle('active', pinned);
  document.getElementById('pin-btn').textContent = pinned ? '📍 Pinned' : '📍 Pin View';
});
document.getElementById('restart-btn').addEventListener('click', () => renderArcs());

// ─── Great-circle interpolation ───────────────────────────────────────────────
// Returns a point fraction t (0–1) along the great circle between two lat/lng pairs
function greatCirclePoint(oLat, oLng, dLat, dLng, t) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const lat1 = toRad(oLat), lng1 = toRad(oLng);
  const lat2 = toRad(dLat), lng2 = toRad(dLng);

  // Haversine angular distance
  const d = 2 * Math.asin(Math.sqrt(
    Math.sin((lat2-lat1)/2)**2 +
    Math.cos(lat1)*Math.cos(lat2)*Math.sin((lng2-lng1)/2)**2
  ));
  if (d < 1e-9) return [oLat, oLng];

  const sinD = Math.sin(d);
  const A = Math.sin((1-t)*d) / sinD;
  const B = Math.sin(t*d)     / sinD;
  const x = A*Math.cos(lat1)*Math.cos(lng1) + B*Math.cos(lat2)*Math.cos(lng2);
  const y = A*Math.cos(lat1)*Math.sin(lng1) + B*Math.cos(lat2)*Math.sin(lng2);
  const z = A*Math.sin(lat1)                + B*Math.sin(lat2);
  return [toDeg(Math.atan2(z, Math.sqrt(x*x+y*y))), toDeg(Math.atan2(y, x))];
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderArcs() {
  if (!overlay || !allData.length) return;
  if (playTimer) cancelAnimationFrame(playTimer);

  const maxS = Math.max(...allData.map(r => r.shipments), 1);
  const tip   = document.getElementById('tooltip');

  // Each arc draws itself from origin→dest using a proper great-circle path.
  // We animate the "tip" position along the great circle so it looks like
  // a pen tracing the arc rather than the arc stretching.
  //
  // deck.gl ArcLayer doesn't natively support partial paths, so we fake it:
  // we render each arc as a tiny arc whose SOURCE == tip-1-step and TARGET == tip
  // combined with a PathLayer of the already-drawn trail.
  //
  // Simpler & performant approach: use PathLayer with N-segment great circle paths
  // and slice them to the animated progress point.

  const SEGMENTS = 60; // points per full arc
  const DURATION = 1200; // ms per arc
  const STAGGER  = 80;

  // Precompute full paths
  const paths = allData.map(d => {
    const pts = [];
    for (let s = 0; s <= SEGMENTS; s++) {
      const [lat, lng] = greatCirclePoint(d.originLat, d.originLng, d.destLat, d.destLng, s/SEGMENTS);
      pts.push([lng, lat]);
    }
    return pts;
  });

  // Arc height offset — lift mid-points above the map plane
  // We bake a vertical "height" into the path using deck.gl's PathLayer
  // which doesn't do 3-D height directly... so we'll use the ArcLayer trick:
  // render MANY tiny arcs chained together is complex. Instead, use the
  // approach of keeping ArcLayer but slicing via a "ghost" destination.
  //
  // Best achievable with ArcLayer: we set source=origin, target=currentTip,
  // getHeight stays constant at 0.4. This gives a correct arc *shape* at all
  // times — the arc curves appropriately from origin to wherever the tip is.
  // That's the "pen drawing" effect we want.

  const startTime = performance.now();

  function frame(now) {
    const elapsed = now - startTime;

    const arcs = allData.map((d, i) => {
      const raw = (elapsed - i * STAGGER) / DURATION;
      const t   = Math.min(1, Math.max(0, raw));
      if (t <= 0) return null;

      const [tipLat, tipLng] = greatCirclePoint(d.originLat, d.originLng, d.destLat, d.destLng, t);
      // Fade in quickly, stay opaque
      const alpha = Math.min(200, Math.round(t * 800));
      return { ...d, tipLat, tipLng, alpha };
    }).filter(Boolean);

    overlay.setProps({
      layers: [
        new deck.ArcLayer({
          id: 'arcs',
          data: arcs,
          getSourcePosition: d => [d.originLng, d.originLat],
          getTargetPosition: d => [d.tipLng, d.tipLat],
          getSourceColor: d => [0, 69, 147, d.alpha],
          getTargetColor: d => [0, 120, 220, d.alpha],
          getWidth: d => Math.max(1.2, (d.shipments / maxS) * 5),
          getHeight: 0.4,
          updateTriggers: { getTargetPosition: elapsed, getSourceColor: elapsed, getTargetColor: elapsed },
          pickable: true,
          onHover: ({ object, x, y }) => {
            if (object) {
              tip.style.display = 'block';
              tip.style.left = (x+14)+'px'; tip.style.top = (y+14)+'px';
              tip.innerHTML = `<strong>${object.originCity} → ${object.destCity}</strong><br>
                Spend: ${fmtMoney(object.spend)}<br>
                Shipments: ${object.shipments.toLocaleString()}`;
            } else tip.style.display = 'none';
          },
        }),
      ]
    });

    const allDone = elapsed > (allData.length - 1) * STAGGER + DURATION;
    if (!allDone) playTimer = requestAnimationFrame(frame);
  }

  playTimer = requestAnimationFrame(frame);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtMonthKey(v) {
  if (!v) return '';
  const d = new Date(typeof v === 'number' ? v : Date.parse(v));
  if (isNaN(d)) return String(v);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`;
}
function fmtMoney(n) {
  return n>=1e6 ? '$'+(n/1e6).toFixed(1)+'M' : n>=1e3 ? '$'+(n/1e3).toFixed(1)+'k' : '$'+n.toFixed(0);
}
</script>
</body>
</html>
